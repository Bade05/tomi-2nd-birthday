<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Oluwatomisin Jasmine 2nd Birthday</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="gallery-page">
    <!-- ===== GALLERY HEADER ===== -->
    <header class="gallery-header">
      <a href="index.html" class="back-btn">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back to Invitation
      </a>
    </header>

    <!-- ===== PHOTO GALLERY ===== -->
    <section class="py-8 px-5">
      <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
          <p
            class="text-sm font-medium tracking-widest uppercase mb-3"
            style="color: var(--sage)"
          >
            Photo Album
          </p>
          <h1
            class="font-display text-3xl sm:text-4xl font-bold mb-2"
            style="color: var(--cocoa)"
          >
            Moments of Joy
          </h1>
          <p class="text-base" style="color: var(--cocoa-muted)">
            Tap any photo to view full screen
          </p>
        </div>

        <div id="photoGrid" class="photo-grid">
          <!-- Photos rendered by JS -->
        </div>

        <div id="pagination" class="pagination">
          <!-- Pagination rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="py-8 px-5 text-center">
      <p class="text-sm" style="color: var(--cocoa-muted)">
        Made with love by Uncle Timileyin
      </p>
    </footer>

    <!-- ===== LIGHTBOX ===== -->
    <div
      id="lightbox"
      class="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Photo viewer"
    >
      <button class="lightbox-close" aria-label="Close photo viewer">
        &times;
      </button>
      <button class="lightbox-nav lightbox-prev" aria-label="Previous photo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="lightbox-content">
        <img id="lightboxImg" src="" alt="Full size photo" />
      </div>
      <button class="lightbox-nav lightbox-next" aria-label="Next photo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
